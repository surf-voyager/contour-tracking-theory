# Stage 05 — Forward-sonar batch (90° FOV, high f_s, higher noise)
#
# Configuration:
#   - Fix:  w_FOV = π/2 rad (90°), f_s = 10 Hz, σ_η(d) = 0.05 + 0.01·d  m
#   - Sweep (5 axes): κ_max, κ'_max, v*, τ_d, V̄_c
#   - N=2000 × M=3 noise realisations
#   - Expected: Lost-G dominates at high κ'_max regions (> 10 % per run)
#
# A forward sonar has a narrow cone; the wall tangent rotates out of the
# FOV whenever the wall curvature changes faster than the AUV can yaw
# its boresight ⇒ vis_t flips 0 ⇒ Lost-G; the dwell is capped by the
# geometric-occlusion dwell T*_G = ū⁻¹·√(w_FOV/κ'_max).
#
# σ_η(d) is range-dependent (nominal sensor model):
#   σ_η_a = 0.05 m  intercept (forward beams pick up bottom reverb)
#   σ_η_b = 0.01   slope (range divergence at higher d)

engine: py
stage: 05
run_tag: forward_n2000
seed: 45   # forward batch

N: 2000

axes:
  kappa_max:     [0.01,  1.0,  "log"]
  kappa_dot_max: [1.0e-3, 1.0e-1, "log"]   # κ'_max swept for T*_G
  v_star:        [0.2,   2.0,  "linear"]
  tau_d:         [0.05,  0.5,  "linear"]
  bar_Vc:        [0.0,   0.3,  "linear"]

fixed:
  # Forward fingerprint
  w_FOV: 1.5708       # π/2 rad (90°)
  f_s: 10.0           # Hz — fast staring update
  sigma_eta_a: 0.05   # m  intercept of σ_η(d)
  sigma_eta_b: 0.01   # slope of σ_η(d) [m / m]
  # Misc
  u_gate: 0.3
  # legacy scalar sigma_eta evaluated at d_star: 0.05 + 0.01 * 2 = 0.070 m
  sigma_eta: 0.070

sim:
  T_end: 120.0
  dt: 0.1
  d_star: 2.0
  d_min: 0.5
  side: L
  ds: 0.1
  noise_seed: 0   # driver overrides per noise realisation

hull:
  u_max: 2.0
  r_max: 0.5
  dot_r_max: 1.0
  u_gate: 0.3
  tau_u: 0.5
  zeta_gate: 2.0

los:
  Delta: 2.0
  K_p: 0.4
  K_ff: 1.0
  K_theta: 0.5
  d_star: 2.0
  style: sin

# Number of noise realisations per LHS config; the driver loops
# noise_seed in {0,1,2}.  N=2000 × M=3 = 6000 runs total.
M_realisations: 3
